name: pokebid
description: A Pokemon card marketplace app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  supabase_flutter: ^2.3.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  url_launcher: ^6.2.5
  image_picker: ^1.1.2
  photo_view: ^0.15.0
  geolocator: ^13.0.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_crashlytics: ^4.1.3
  flutter_local_notifications: ^17.2.2
  sign_in_with_apple: ^6.1.3
  crypto: ^3.0.3

  sqflite: any
  path: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
